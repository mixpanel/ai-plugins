name: routing-ambiguity
failure_mode: |
  User says "create a feature flag for the new checkout flow" but actually wants
  to A/B test two checkout variants and measure conversion. Skill must NOT
  silently call Create-Feature-Flag with a Feature Gate; it must disambiguate
  before picking a tool.

trigger_phrase: |
  Create a feature flag for the new checkout flow.

preconditions:
  project_state: |
    No existing flags or experiments match "checkout".
  user_context: |
    The user is a PM. They have not specified flagType, variants, hypothesis,
    metrics, or rollout intent. The phrase "the new checkout flow" suggests
    they may be planning to compare against the old flow.

expected_behavior:
  must_do:
    - "Call List-Feature-Flags first with name='checkout' to surface any prior work, per Spine 3."
    - "Ask exactly ONE disambiguating question covering the three flag-shaped products: Feature Gate (on/off toggle), Dynamic Config (per-user configuration values), Experiment (compare variants and measure)."
    - "Reflect the most likely intent in the question, e.g. note that 'the new checkout flow' often implies a comparison against the old flow, which would be an Experiment."
    - "If the user confirms experiment intent, route to Create-Experiment and defer to the experiment-setup skill — do not author the experiment design here."
    - "If the user confirms Feature Gate intent, default to omitting custom variants (auto-On/Off) unless they ask for custom keys."

  must_not_do:
    - "Call Create-Feature-Flag immediately with flagType='feature_gate' on the assumption the user 'just wants a flag'."
    - "Fan out into a multi-question requirements interview — one disambiguation, then proceed."
    - "Ask for a key — the auto-derived key is almost always correct, and the user didn't mention one."
    - "Set status='enabled' on creation as a shortcut."
    - "Default to flagType='experiment' on Create-Feature-Flag — the tool rejects that."

  references_consulted:
    - "SKILL.md (Spine 1 routing table + one-question rule)"
    - "references/routing-and-setup.md (only if the user picks Feature Gate or Dynamic Config and needs configuration help)"
    - "references/experiment-linked-flags.md (only if the user picks Experiment, to explain why Create-Experiment owns the backing flag)"
