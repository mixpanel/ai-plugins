name: stale-flag-cleanup
failure_mode: |
  User asks the skill to clean up a long list of feature flags, many of which
  are sitting at status='enabled', rolloutPercentage=1.0. The skill must NOT
  treat 100%-rolled-out flags as "healthy and done" — it must triage them as
  operational (permanent, keep) vs shipped-but-stale (archive after SDK
  cleanup) vs experiment-linked (route through Update-Experiment).

trigger_phrase: |
  We have ~200 feature flags in this project and most haven't been touched in
  6+ months. Can you help us figure out what to clean up?

preconditions:
  flag_inventory:
    summary: |
      Mix of:
      - ~30 flags at status='enabled', rolloutPercentage=1.0, no description, no recent updates
      - ~50 flags at status='disabled', some with description like "kill switch for legacy billing", others with no description
      - ~10 flags at status='archived'
      - ~20 flags with experiment_id set (some experiments concluded, some active)
      - ~90 flags at various rolloutPercentage values between 0.1 and 0.5, mixed status
  user_context: |
    Eng manager doing a quarterly hygiene review. Wants a triage process, not
    a flag-by-flag decision.

expected_behavior:
  must_do:
    - "Establish a triage framework with three categories: operational (permanent, keep), shipped-but-stale (archive after SDK cleanup), in-flight (leave for the owning team)."
    - "Recommend the cleanup workflow from references/hygiene-and-cleanup.md: List-Feature-Flags(status='enabled') and List-Feature-Flags(status='disabled') as the starting cuts."
    - "Call out the '100% forever' anti-pattern explicitly: a flag at status=enabled, rolloutPercentage=1.0 with no description is the most common form of flag debt — must be triaged as operational-with-justification or shipped-but-stale."
    - "For disabled flags, recommend the question 'is the SDK code that reads this flag still in the codebase?' as the triage cut."
    - "For flags with experiment_id set, explicitly route status changes through Update-Experiment, not Update-Feature-Flag (per references/experiment-linked-flags.md)."
    - "Explain the archive precondition: must be disabled before archived (two calls). Cite the FAILED_PRECONDITION error."
    - "Distinguish archive vs kill switch: archive is terminal cleanup for feature-no-longer-iterating; kill switch (disable) is for debugging an active flag."
    - "Recommend writing descriptions on the keep-as-operational flags so the next maintainer knows why they're permanent."

  must_not_do:
    - "Recommend deleting flags or calling status='archived' on enabled flags directly — the API rejects this and the user would hit FAILED_PRECONDITION."
    - "Recommend bulk-archiving all 100%-rolled-out flags without distinguishing operational from shipped-but-stale — operational flags are SUPPOSED to stay enabled."
    - "Mutate experiment-linked flags via Update-Feature-Flag — the experiment will overwrite the change."
    - "Skip the SDK-code-still-references-this check for disabled flags — that's the load-bearing question."
    - "Treat 'no recent updates' as the primary signal. A 5-year-old kill switch for legacy billing is healthy. A 1-month-old flag at 100% with no description is debt."

  references_consulted:
    - "references/hygiene-and-cleanup.md (triage workflow, '100% forever' anti-pattern, archive vs kill switch, ownership/description hygiene)"
    - "references/lifecycle-and-state-machine.md (archive precondition + two-call sequence)"
    - "references/experiment-linked-flags.md (routing experiment-linked flag changes through Update-Experiment)"
    - "SKILL.md (Lifecycle Step 5 — three terminal states)"
